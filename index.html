<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dev Name — Full-Stack Engineer | Portfolio Template</title>

    <!-- SEO ready Website -->
    <!-- Primary SEO meta tags -->
    <meta
      name="description"
      content="A full-stack engineer portfolio template — showcasing projects, tech stack, and GitHub activity. Built as a frontend practice layout."
    />
    <meta name="author" content="Dev Name" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://devname.dev/" />

    <!-- Open Graph tags (for social media previews: Twitter, LinkedIn, Discord, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Dev Name — Full-Stack Engineer" />
    <meta
      property="og:description"
      content="A full-stack engineer portfolio template — showcasing projects, tech stack, and GitHub activity."
    />
    <meta property="og:url" content="https://devname.dev/" />
    <meta property="og:image" content="https://devname.dev/og-image.png" />

    <!-- Twitter Card tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dev Name — Full-Stack Engineer" />
    <meta
      name="twitter:description"
      content="A full-stack engineer portfolio template — showcasing projects, tech stack, and GitHub activity."
    />
    <meta name="twitter:image" content="https://devname.dev/og-image.png" />

    <link rel="stylesheet" href="style.css" />

    <!-- Google Fonts: Inter (UI text) + JetBrains Mono (labels, badges, stats) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="navbar">
      <div class="navbar-inner">
        <a href="#" class="logo">devname.dev</a>

        <div class="nav-right">
          <nav class="nav-links">
            <a href="#work">Work</a>
            <a href="#stack">Stack</a>
            <a href="#github">GitHub</a>
          </nav>

          <a href="#contact" class="btn btn-outline">Contact</a>
        </div>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="hero-inner">
          <span class="badge">
            <span class="badge-dot"></span>
            Available for new projects
          </span>

          <h1 class="hero-heading">
            <span class="line-white">Dev Name</span>
            <span class="line-dim">Full-Stack</span>
            <span class="line-purple">Engineer</span>
          </h1>

          <p class="hero-text">
            I build fast, reliable software — from distributed backend systems
            to the interfaces people actually enjoy using.
          </p>

          <div class="hero-buttons">
            <a href="#work" class="btn btn-solid">View Projects</a>
            <a href="#contact" class="btn btn-outline btn-hero-outline">Get in touch →</a>
          </div>
        </div>
      </section>
      <script src="script.js"></script>
    </main>

    <script src="script.js"></script>
  </body>
</html>
